services:
  postgres:
    image: postgres:15-alpine
    container_name: prueba_tecnica_db
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prueba_tecnica
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: